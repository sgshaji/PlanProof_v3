# Development environment: Python dev container + Neo4j
# Usage:
#   docker compose -f docker/docker-compose.dev.yml up -d
#   docker compose -f docker/docker-compose.dev.yml exec planproof-dev bash
#
# Or use VS Code Dev Containers (recommended) — it picks this up automatically.

services:
  neo4j:
    image: neo4j:5-community
    container_name: planproof-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/planproof-dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: planproof-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Pull default models on first start
    # Run manually: docker exec planproof-ollama ollama pull llama3.1
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3

  planproof-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: planproof-dev
    volumes:
      # Mount source code — edits on host are instantly visible in container
      - ../src:/app/src
      - ../tests:/app/tests
      - ../configs:/app/configs
      - ../data:/app/data
      - ../docs:/app/docs
      - ../scripts:/app/scripts
      - ../notebooks:/app/notebooks
      - ../Makefile:/app/Makefile
      - ../pyproject.toml:/app/pyproject.toml
    environment:
      # LLM — default to Ollama (free, local)
      PLANPROOF_LLM_PROVIDER: ${PLANPROOF_LLM_PROVIDER:-ollama}
      PLANPROOF_LLM_MODEL: ${PLANPROOF_LLM_MODEL:-llama3.1}
      PLANPROOF_LLM_API_KEY: ${PLANPROOF_LLM_API_KEY:-}
      PLANPROOF_OLLAMA_BASE_URL: http://ollama:11434
      # Neo4j
      PLANPROOF_NEO4J_URI: bolt://neo4j:7687
      PLANPROOF_NEO4J_USER: neo4j
      PLANPROOF_NEO4J_PASSWORD: planproof-dev
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started
    # Keep alive for interactive use / VS Code attachment
    command: sleep infinity

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_models:
